apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: tanilytics-query
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: tanilytics/auth-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: auth-service-config
            - secretRef:
                name: auth-service-secret