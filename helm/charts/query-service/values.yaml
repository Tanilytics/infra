namespace: tanilytics-query
replicaCount: 1

image:
  repository: tanilytics/query-service
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8081
  containerPort: 8081

spring:
  profilesActive: docker

redis:
  host: redis
  port: 6379
  password: ""

clickhouse:
  host: clickhouse.tanilytics-storage.svc.cluster.local
  port: 8123
  database: default
  username: yassine
  user: yassine
  password: 12345678

jwt:
  secret: change-me-in-production-use-at-least-256-bits

otel:
  endpoint: http://otel-collector:4317

resources: {}

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
