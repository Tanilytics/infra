apiVersion: v1
kind: ConfigMap
metadata:
  name: processing-config
  namespace: tanilytics-processing
data:
  PROCESSING_PORT: ":3000"
  REDPANDA_BROKERS: "redpanda.tanilytics-stream.svc.cluster.local:9093"
  REDPANDA_SASL_MECHANISM: "SCRAM-SHA-256"

  DLQ_TOPIC: "dlq"
  DLQ_PRODUCER_BATCH_MAX_BYTES: "1048576"
  DLQ_PRODUCER_LINGER: "0ms"
  DLQ_PRODUCER_MAX_BUFFERED_RECORDS: "1000"
  DLQ_PRODUCER_RECORD_RETRIES: "5"
  DLQ_PRODUCER_RETRY_TIMEOUT: "1m"

  CLICKHOUSE_ADDRS: "jdbc:clickhouse://clickhouse.tanilytics-storage.svc.cluster.local:9000"
  CLICKHOUSE_DATABASE: "default"
  CLICKHOUSE_DIAL_TIMEOUT: "5s"
  CLICKHOUSE_MAX_OPEN_CONNS: "10"
  CLICKHOUSE_MAX_IDLE_CONNS: "5"
  CLICKHOUSE_CONN_OPEN_STRATEGY: "in_order"

  CH_BATCH_SIZE: "10000"
  CH_BATCH_TIMEOUT: "5s"

  LOG_LEVEL: "debug"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

  CONSUMER_GROUP: "event-processor"
  CONSUMER_TOPIC: "raw-events"
  CONSUMER_RESET_OFFSET: "end"
  CONSUMER_FETCH_MIN_BYTES: "65536"
  CONSUMER_FETCH_MAX_BYTES: "52428800"
  CONSUMER_FETCH_MAX_WAIT: "250ms"
  CONSUMER_FETCH_MAX_PARTITION_BYTES: "4194304"
  CONSUMER_BLOCK_REBALANCE_ON_POLL: "false"
  CONSUMER_MAX_CONCURRENT_FETCHES: "2"

  GEOIP_DB_PATH: "/data/GeoLite2-City.mmdb"
  REDIS_URL: redis://redis.tanilytics-ingest.svc.cluster.local:6379

