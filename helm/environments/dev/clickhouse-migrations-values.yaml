job:
  name: clickhouse-migrations
  backoffLimit: 3
  restartPolicy: Never
  image: clickhouse/clickhouse-server:latest
  env:
    - name: CLICKHOUSE_USER
      valueFrom:
        secretKeyRef:
          name: clickhouse-credentials
          key: user
    - name: CLICKHOUSE_PASSWORD
      valueFrom:
        secretKeyRef:
          name: clickhouse-credentials
          key: password
  command: |
    clickhouse-client \
      -h clickhouse-clickhouse.tanilytics-storage.svc.cluster.local \
      --user ${CLICKHOUSE_USER} \
      --password ${CLICKHOUSE_PASSWORD} \
      --query "CREATE TABLE IF NOT EXISTS default.events
    (
        event_id UUID,
        site_id String,
        visitor_id String,
        session_id String,
        event_type LowCardinality(String),
        timestamp DateTime64(3, 'UTC'),
        url String,
        referrer String,
        utm_source String,
        utm_medium String,
        utm_campaign String,
        country LowCardinality(String),
        region LowCardinality(String),
        device_type LowCardinality(String),
        browser LowCardinality(String),
        os LowCardinality(String),
        screen_width UInt16,
        properties String,
        ip_hash String,
        consent_given Bool
    )
    ENGINE = MergeTree
    PARTITION BY toYYYYMM(timestamp)
    ORDER BY (site_id, timestamp, visitor_id, event_id);"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

