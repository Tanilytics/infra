name: tanilytics-dev
networks:
  tanilytics_network:
    driver: bridge
volumes:
  kafka-data: null
  postgres-data: null
  redis-data: null
  clickhouse-data: null
services:
  ##################
  # Kafka Broker #
  ##################
  kafka:
    profiles: ["pipeline"]
    image: ${KAFKA_IMAGE}
    container_name: kafka
    ports:
      - ${REDPANDA_0_KAFKA_PORT}:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:19092,SASL_PLAINTEXT_HOST://:9092,SASL_PLAINTEXT_INTERNAL://:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,SASL_PLAINTEXT_HOST://localhost:${REDPANDA_0_KAFKA_PORT},SASL_PLAINTEXT_INTERNAL://kafka:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT_HOST:SASL_PLAINTEXT,SASL_PLAINTEXT_INTERNAL:SASL_PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka-server-jaas.conf"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka-server-jaas.conf:/etc/kafka/kafka-server-jaas.conf:ro
    networks:
      - tanilytics_network
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:19092",
        ]
      interval: 10s
      timeout: 15s
      retries: 10

  ####################
  # Kafka Console #
  ####################
  console:
    profiles: ["pipeline"]
    container_name: redpanda-console
    image: ${CONSOLE_IMAGE}
    networks:
      - tanilytics_network
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    volumes:
      - ./config:/tmp/config/
    environment:
      CONFIG_FILEPATH: ${CONFIG_FILEPATH:-/tmp/config.yml}
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["kafka:9095"]
          sasl:
            enabled: true
            username: ${REDPANDA_SUPERUSER}
            password: ${REDPANDA_PASSWORD}
            mechanism: ${REDPANDA_SASL_MECHANISM}
        schemaRegistry:
          enabled: false
    ports:
      - ${CONSOLE_PORT}:8080
    depends_on:
      kafka:
        condition: service_healthy
      createtopic:
        condition: service_completed_successfully

  ############
  # Redis #
  ############
  redis:
    profiles: ["pipeline", "app"]
    image: ${REDIS_IMAGE}
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - tanilytics_network
    ports:
      - ${REDIS_PORT}:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ################
  # ClickHouse #
  ################
  clickhouse:
    profiles: ["pipeline", "app"]
    image: ${CLICKHOUSE_IMAGE}
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - tanilytics_network
    ports:
      - ${CLICKHOUSE_HTTP_PORT}:8123
      - ${CLICKHOUSE_TCP_PORT}:9000
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--host",
          "127.0.0.1",
          "--user=${CLICKHOUSE_USERNAME}",
          "--password=${CLICKHOUSE_PASSWORD}",
          "--database=${CLICKHOUSE_DATABASE}",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  ################
  # PostgreSQL #
  ################
  postgres:
    profiles: ["app"]
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tanilytics_network
    ports:
      - ${POSTGRES_PORT}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ###################
  # Auth Service #
  ###################
  auth-service:
    profiles: ["app"]
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      JWT_INTERNAL_AUDIENCE: ${JWT_INTERNAL_AUDIENCE}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${JAVA_OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - tanilytics_network
    ports:
      - ${AUTH_SERVICE_PORT}:8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ####################
  # Query Service #
  ####################
  query-service:
    profiles: ["app"]
    build:
      context: ../query-service
      dockerfile: Dockerfile
    container_name: query-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME}
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${JAVA_OTEL_EXPORTER_OTLP_ENDPOINT}
    networks:
      - tanilytics_network
    ports:
      - ${QUERY_SERVICE_PORT}:8081
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ####################
  # Init container to create SASL user and topics #
  ####################
  createtopic:
    profiles: ["pipeline"]
    image: ${KAFKA_IMAGE}
    networks:
      - tanilytics_network
    entrypoint: /bin/bash
    command:
      - -c
      - |
        /opt/kafka/bin/kafka-configs.sh --bootstrap-server kafka:19092 --alter --add-config "SCRAM-SHA-256=[password=${REDPANDA_PASSWORD}]" --entity-type users --entity-name ${REDPANDA_SUPERUSER} && \
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic ${RAW_EVENTS_TOPIC} --partitions ${RAW_EVENTS_PARTITIONS} --replication-factor ${RAW_EVENTS_REPLICAS} --config cleanup.policy=${RAW_EVENTS_CLEANUP_POLICY} --config retention.ms=${RAW_EVENTS_RETENTION_MS} --config retention.bytes=${RAW_EVENTS_RETENTION_BYTES} --config compression.type=${RAW_EVENTS_COMPRESSION} && \
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic ${DLQ_TOPIC} --partitions ${DLQ_PARTITIONS} --replication-factor ${DLQ_REPLICAS} --config cleanup.policy=${DLQ_CLEANUP_POLICY} --config retention.ms=${DLQ_RETENTION_MS} --config compression.type=${DLQ_COMPRESSION}
    depends_on:
      kafka:
        condition: service_healthy

  prometheus:
    profiles: ["app"]
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - tanilytics_network
    ports:
      - "9090:9090"

  jaeger:
    profiles: ["app"]
    image: jaegertracing/jaeger:2.16.0
    container_name: jaeger
    networks:
      - tanilytics_network
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  ###############
  # Ingestion #
  ###############
  ingestion:
    profiles: ["pipeline"]
    build:
      context: ../ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    networks:
      - tanilytics_network
    ports:
      - "${INGESTION_PORT}:3000"
    environment:
      - INGESTION_PORT=${INGESTION_PORT}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS}
      - REDPANDA_SASL_USER=${REDPANDA_SASL_USER}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD}
      - REDPANDA_SASL_MECHANISM=${REDPANDA_SASL_MECHANISM}
      - PRODUCER_TOPIC=${PRODUCER_TOPIC}
      - PRODUCER_BATCH_MAX_BYTES=${PRODUCER_BATCH_MAX_BYTES}
      - PRODUCER_LINGER=${PRODUCER_LINGER}
      - PRODUCER_MAX_BUFFERED_RECORDS=${PRODUCER_MAX_BUFFERED_RECORDS}
      - PRODUCER_RECORD_RETRIES=${PRODUCER_RECORD_RETRIES}
      - PRODUCER_RETRY_TIMEOUT=${PRODUCER_RETRY_TIMEOUT}
      - REDIS_URL=${REDIS_URL}
      - LOG_LEVEL=${LOG_LEVEL}
      - BLOOM_FILTER_CAPACITY=${BLOOM_FILTER_CAPACITY}
      - BLOOM_FILTER_ERROR_RATE=${BLOOM_FILTER_ERROR_RATE}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      createtopic:
        condition: service_completed_successfully

  ################
  # Processing #
  ################
  processing:
    profiles: ["pipeline"]
    build:
      context: ../processing
      dockerfile: Dockerfile
    container_name: processing
    networks:
      - tanilytics_network
    environment:
      - PROCESSING_PORT=${PROCESSING_PORT}
      - REDPANDA_BROKERS=${REDPANDA_BROKERS}
      - REDPANDA_SASL_USER=${REDPANDA_SASL_USER}
      - REDPANDA_SASL_PASSWORD=${REDPANDA_SASL_PASSWORD}
      - REDPANDA_SASL_MECHANISM=${REDPANDA_SASL_MECHANISM}
      - DLQ_TOPIC=${DLQ_TOPIC}
      - DLQ_PRODUCER_BATCH_MAX_BYTES=${DLQ_PRODUCER_BATCH_MAX_BYTES}
      - DLQ_PRODUCER_LINGER=${DLQ_PRODUCER_LINGER}
      - DLQ_PRODUCER_MAX_BUFFERED_RECORDS=${DLQ_PRODUCER_MAX_BUFFERED_RECORDS}
      - DLQ_PRODUCER_RECORD_RETRIES=${DLQ_PRODUCER_RECORD_RETRIES}
      - DLQ_PRODUCER_RETRY_TIMEOUT=${DLQ_PRODUCER_RETRY_TIMEOUT}
      - CLICKHOUSE_ADDRS=${CLICKHOUSE_ADDRS}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE}
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DIAL_TIMEOUT=${CLICKHOUSE_DIAL_TIMEOUT}
      - CLICKHOUSE_MAX_OPEN_CONNS=${CLICKHOUSE_MAX_OPEN_CONNS}
      - CLICKHOUSE_MAX_IDLE_CONNS=${CLICKHOUSE_MAX_IDLE_CONNS}
      - CLICKHOUSE_CONN_OPEN_STRATEGY=${CLICKHOUSE_CONN_OPEN_STRATEGY}
      - CH_BATCH_SIZE=${CH_BATCH_SIZE}
      - CH_BATCH_TIMEOUT=${CH_BATCH_TIMEOUT}
      - REDIS_URL=${REDIS_URL}
      - ANONYMIZATION_SALT=${ANONYMIZATION_SALT}
      - LOG_LEVEL=${LOG_LEVEL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - CONSUMER_GROUP=${CONSUMER_GROUP}
      - CONSUMER_TOPIC=${CONSUMER_TOPIC}
      - CONSUMER_RESET_OFFSET=${CONSUMER_RESET_OFFSET}
      - CONSUMER_FETCH_MIN_BYTES=${CONSUMER_FETCH_MIN_BYTES}
      - CONSUMER_FETCH_MAX_BYTES=${CONSUMER_FETCH_MAX_BYTES}
      - CONSUMER_FETCH_MAX_WAIT=${CONSUMER_FETCH_MAX_WAIT}
      - CONSUMER_FETCH_MAX_PARTITION_BYTES=${CONSUMER_FETCH_MAX_PARTITION_BYTES}
      - CONSUMER_BLOCK_REBALANCE_ON_POLL=${CONSUMER_BLOCK_REBALANCE_ON_POLL}
      - CONSUMER_MAX_CONCURRENT_FETCHES=${CONSUMER_MAX_CONCURRENT_FETCHES}
      - GEOIP_DB_PATH=${GEOIP_DB_PATH}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      createtopic:
        condition: service_completed_successfully
